<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Pool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .team-card { transition: all 0.2s; cursor: pointer; border-width: 2px; }
        .team-card:hover:not(.locked-ui) { transform: translateY(-2px); border-color: #93c5fd; }
        .selected { border-color: #3b82f6 !important; background-color: #eff6ff !important; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1); }
        .locked-ui { opacity: 0.6; cursor: not-allowed !important; filter: grayscale(0.6); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        @keyframes pulse-blue { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .saving { animation: pulse-blue 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden font-sans">

    <div id="auth-overlay" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6">
        <div class="bg-gray-800 p-10 rounded-3xl border border-gray-700 max-w-md w-full text-center shadow-2xl">
            <div class="text-6xl mb-6">⚽</div>
            <h2 class="text-3xl font-black mb-2 italic uppercase tracking-tighter text-white">2026 World Cup Pool</h2>
            <p class="text-gray-400 text-sm mb-8">Login with email to manage your $150 squad.</p>
            <input type="email" id="email-input" placeholder="Enter your email..." class="w-full p-4 rounded-2xl bg-gray-900 border border-gray-700 mb-4 text-white focus:border-blue-500 outline-none transition-all">
            <button onclick="handleLogin()" id="login-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 transition-all text-white">
                Enter Portal
            </button>
        </div>
    </div>

    <div class="flex h-full opacity-0 transition-opacity duration-700" id="main-app">
        <div class="w-2/3 h-full overflow-y-auto p-10 bg-white text-gray-900">
            <header class="mb-10 flex justify-between items-end border-b-4 border-gray-900 pb-6">
                <div>
                    <h1 class="text-4xl font-black uppercase italic tracking-tighter">Team Selection</h1>
                    <div id="user-display" class="text-blue-600 font-bold text-xs uppercase tracking-widest mt-1"></div>
                </div>
                <div id="lock-status" class="text-right px-4 py-2 rounded-lg bg-gray-100 border font-bold text-xs">
                    WINDOW: <span id="status-text" class="text-green-600 uppercase">Open</span>
                </div>
            </header>
            <div id="tiers-container" class="grid gap-12 pb-20"></div>
        </div>

        <div class="w-1/3 h-full bg-gray-950 p-8 flex flex-col shadow-2xl border-l border-gray-800">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic uppercase text-white">Your Roster</h2>
                <span id="roster-count" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold text-white uppercase">0 Teams</span>
            </div>

            <div class="bg-gray-900 p-6 rounded-3xl mb-8 border border-gray-800">
                <div class="flex justify-between items-center mb-3 text-white">
                    <span class="text-gray-500 text-xs font-black uppercase tracking-widest">Remaining Budget</span>
                    <span id="budget-display" class="text-3xl font-mono font-bold text-green-400">$150</span>
                </div>
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden">
                    <div id="budget-bar" class="bg-green-500 h-full transition-all duration-700" style="width: 100%"></div>
                </div>
            </div>

            <div id="roster-list" class="flex-grow overflow-y-auto space-y-3 mb-8"></div>

            <button onclick="saveToSupabase()" id="save-btn" class="w-full bg-green-600 hover:bg-green-500 py-5 rounded-2xl font-black text-xl uppercase tracking-widest transition-all shadow-xl active:scale-95 text-white">
                Save Selection
            </button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---

        const SUPABASE_KEY = 'sb_publishable_3cT0wz86jjMqaEciDUwseg_Y59smIY3';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Tournament Kickoff Date
        const LOCK_DATE = new Date('2026-06-11T12:00:00');

            {"flag": "🇭🇹", "tier": 3, "group": "C", "name": "Haiti", "cost": 2}
        ];

        async function handleLogin() {
            const email = document.getElementById('email-input').value.toLowerCase().trim();
            if (!email.includes('@')) return alert("Enter a valid email address.");
            userEmail = email;
            
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('main-app').classList.remove('opacity-0');
            document.getElementById('user-display').innerText = `Editing Roster for: ${userEmail}`;
            
            if (isLocked) {
                document.getElementById('status-text').innerText = "LOCKED";
                document.getElementById('status-text').className = "text-red-600 uppercase";
                document.getElementById('save-btn').classList.add('hidden');
            }

            renderPool();
            loadFromSupabase();
        }

        function renderPool() {
            const container = document.getElementById('tiers-container');
            container.innerHTML = '';
            [1, 2, 3].forEach(tierNum => {
                const tierTeams = teams.filter(t => t.tier === tierNum);
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="flex items-center gap-4 mb-4">
                        <div class="bg-gray-900 text-white px-3 py-1 font-black italic text-xs tracking-widest uppercase">Tier ${tierNum}</div>
                        <div class="h-px bg-gray-200 flex-grow"></div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                        ${tierTeams.map(t => `
                            <div onclick="toggleTeam('${t.name}')" id="pool-${t.name.replace(/\s/g, '')}" class="team-card bg-white border-2 border-gray-100 rounded-2xl p-4 shadow-sm ${isLocked ? 'locked-ui' : ''}">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="text-4xl">${t.flag}</span>
                                    <span class="bg-blue-50 text-blue-700 font-bold px-2 py-1 rounded text-xs">$${t.cost}</span>
                                </div>
                                <div class="font-black text-gray-900 uppercase text-[10px] tracking-tight truncate">${t.name}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function toggleTeam(name) {
            if (isLocked) return;
            const team = teams.find(t => t.name === name);
            const idx = myPicks.findIndex(t => t.name === name);
            
            if (idx > -1) {
                myPicks.splice(idx, 1);
            } else {
                if (team.tier === 1 && myPicks.some(t => t.tier === 1)) {
                    return alert("Rule Violation: Maximum of 1 Tier 1 team allowed.");
                }
                myPicks.push(team);
            }
            updateUI();
        }

        function updateUI() {
            let spent = 0;
            document.querySelectorAll('.team-card').forEach(el => el.classList.remove('selected'));
            const list = document.getElementById('roster-list');
            list.innerHTML = '';

            myPicks.forEach(t => {
                spent += t.cost;
                const poolEl = document.getElementById(`pool-${t.name.replace(/\s/g, '')}`);
                if (poolEl) poolEl.classList.add('selected');

                const item = document.createElement('div');
                item.className = "flex items-center justify-between bg-gray-800 p-4 rounded-2xl border border-gray-700 text-white animate-in slide-in-from-right";
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${t.flag}</span>
                        <div class="text-[10px] font-black uppercase tracking-widest">${t.name}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-green-400 font-mono font-bold text-sm">$${t.cost}</span>
                        ${!isLocked ? `<button onclick="toggleTeam('${t.name}')" class="text-gray-500 hover:text-red-500 text-xl font-bold transition-colors">&times;</button>` : ''}
                    </div>
                `;
                list.appendChild(item);
            });

            const remaining = 150 - spent;
            document.getElementById('budget-display').innerText = `$${remaining}`;
            document.getElementById('budget-display').className = remaining < 0 ? "text-3xl font-mono font-bold text-red-500" : "text-3xl font-mono font-bold text-green-400";
            document.getElementById('budget-bar').style.width = Math.max(0, (remaining/150)*100) + "%";
            document.getElementById('budget-bar').className = remaining < 0 ? "bg-red-500 h-full transition-all duration-700" : "bg-green-500 h-full transition-all duration-700";
            document.getElementById('roster-count').innerText = `${myPicks.length} TEAMS`;
        }

        async function saveToSupabase() {
            if (isLocked) return;
            const spent = myPicks.reduce((acc, t) => acc + t.cost, 0);
            const t3Count = myPicks.filter(t => t.tier === 3).length;

            if (spent > 150) return alert("Validation Error: Your squad exceeds the $150 budget.");
            if (t3Count < 3) return alert("Validation Error: You must select at least 3 Tier 3 teams.");

            const btn = document.getElementById('save-btn');
            btn.innerText = "SAVING...";
            btn.classList.add('saving');

            try {
                // Wipe old picks and re-insert
                await supabaseClient.from('picks').delete().eq('user_email', userEmail);
                const toInsert = myPicks.map(t => ({ user_email: userEmail, team_name: t.name, tier: t.tier, cost: t.cost }));
                const { error } = await supabaseClient.from('picks').insert(toInsert);

                if (error) throw error;
                alert("✅ Roster saved to the database!");
            } catch (err) {
                alert("Database Error: " + err.message);
            } finally {
                btn.innerText = "SAVE SELECTION";
                btn.classList.remove('saving');
            }
        }

        async function loadFromSupabase() {
            const { data, error } = await supabaseClient.from('picks').select('*').eq('user_email', userEmail);
            if (error) return console.error("Load Error:", error);
            
            if (data && data.length > 0) {
                myPicks = data.map(dbRow => teams.find(t => t.name === dbRow.team_name)).filter(t => t);
                updateUI();
            }
        }
    </script>
</body>
</html>
